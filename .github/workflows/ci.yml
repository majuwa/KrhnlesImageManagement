name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build, Test and Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build (assemble)
        run: ./gradlew assemble --no-daemon --console=plain

      - name: Run unit tests
        run: ./gradlew test --no-daemon --console=plain

      - name: Check code style (Spotless)
        run: ./gradlew spotlessCheck --no-daemon --console=plain

      - name: Run static analysis (detekt)
        run: ./gradlew detekt --no-daemon --console=plain
